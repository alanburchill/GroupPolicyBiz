name: Build and deploy site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.env'
      - 'content/**'
      - 'scripts/**'
      - 'static/**'
      - 'README.md'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - '.env'
      - 'content/**'
      - 'scripts/**'
      - 'static/**'
      - 'README.md'
      - 'requirements.txt'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      SITE_BASE_PATH: ${{ vars.SITE_BASE_PATH }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Load tracked site defaults
        shell: bash
        run: |
          if [ -f .env ]; then
            grep -E '^[A-Za-z_][A-Za-z0-9_]*=' .env >> "$GITHUB_ENV"
          fi

      - name: Generate site
        run: |
          # Optional: Add Google Analytics tracking ID
          # Use --ga-id G-XXXXXXXXXX (GA4) or --ga-id UA-XXXXXXXXX-X (Universal Analytics)
          # Example: python scripts/generate_from_markdown.py --content content/posts --output _site --base-path /GroupPolicyBiz/ --ga-id ${{ secrets.GA_TRACKING_ID }}
          python scripts/generate_from_markdown.py --content content/posts --output _site --base-path "${SITE_BASE_PATH:-/GroupPolicyBiz/}" --site-url "${SITE_URL:-https://alanburchill.github.io}"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

